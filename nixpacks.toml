# Nixpacks configuration for Arolana.com

[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "python311Packages.virtualenv"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = ["python manage.py collectstatic --noinput"]

[phases.start]
cmd = "gunicorn arolana_config.wsgi:application --bind 0.0.0.0:$PORT"

[env]
DISABLE_COLLECTSTATIC = "0"
PYTHON_VERSION = "3.11.9"

[variables]
PYTHONUNBUFFERED = "1"
DJANGO_SETTINGS_MODULE = "arolana_config.settings"
ALLOWED_HOSTS = "*"
DEBUG = "0"
