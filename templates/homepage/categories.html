{% load static %}

{% if categories %}
<section class="mb-16" data-aos="fade-up">
    <div class="flex justify-between items-center mb-8">
        <h2 class="text-3xl font-bold bg-gradient-to-r from-gray-900 to-blue-600 bg-clip-text text-transparent">
            <i class="fas fa-grid-2 text-blue-600 mr-2"></i> Shop by Category
        </h2>
        <a href="{% url 'products:list' %}" class="text-blue-600 hover:text-blue-700 font-semibold transition flex items-center gap-1">
            View All <i class="fas fa-arrow-right"></i>
        </a>
    </div>
    
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-5">
        {% for hp_category in categories %}
        <a href="{% url 'products:category' hp_category.category.slug %}" class="group">
            <div class="bg-white rounded-2xl shadow-md overflow-hidden hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-2">
                <!-- Category Image -->
                <div class="relative h-44 overflow-hidden bg-gradient-to-br from-gray-100 to-gray-200">
                    {% if hp_category.image_url %}
                        <img src="{{ hp_category.image_url }}" alt="{{ hp_category.category.name }}" 
                             class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110"
                             loading="lazy"
                             onerror="this.onerror=null; this.src='https://placehold.co/400x400/3b82f6/white?text={{ hp_category.category.name|urlencode }}';">
                    {% else %}
                        <div class="w-full h-full flex items-center justify-center">
                            <div class="text-center">
                                <i class="fas {{ hp_category.icon }} text-5xl text-blue-500"></i>
                                <p class="text-xs text-gray-500 mt-2">{{ hp_category.category.name }}</p>
                            </div>
                        </div>
                    {% endif %}
                    
                    <!-- Overlay with hover effect -->
                    <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-all duration-300"></div>
                    
                    <!-- Product count badge -->
                    <div class="absolute bottom-2 right-2 bg-black/70 text-white text-xs px-2 py-1 rounded-full opacity-0 group-hover:opacity-100 transition-all duration-300">
                        
                    </div>
                </div>
                
                <!-- Category name footer -->
                <div class="p-3 text-center bg-white">
                    <h3 class="font-bold text-gray-800 group-hover:text-blue-600 transition-colors text-sm">
                        {{ hp_category.category.name }}
                    </h3>
                </div>
            </div>
        </a>
        {% endfor %}
    </div>
</section>
{% endif %}
