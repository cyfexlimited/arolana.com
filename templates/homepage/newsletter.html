{% if settings and settings.is_active %}
<section class="bg-[{{ settings.background_color }}] rounded-2xl p-8 text-center">
    <h3 class="text-2xl font-bold mb-2">{{ settings.title }}</h3>
    <p class="text-gray-600 mb-4">{{ settings.subtitle }}</p>
    <form class="max-w-md mx-auto flex gap-2" method="POST" action="{% url 'accounts:newsletter_subscribe' %}">
        {% csrf_token %}
        <input type="email" name="email" placeholder="Enter your email" class="flex-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">{{ settings.button_text }}</button>
    </form>
</section>
{% endif %}
