{% extends 'base/base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-lg shadow-md p-8">
        <h1 class="text-3xl font-bold mb-6">Track Your Order</h1>
        <form method="GET" class="space-y-4">
            <div>
                <label class="block text-gray-700 font-semibold mb-2">Order Number</label>
                <input type="text" name="order_number" placeholder="e.g., ARO-123456" class="w-full px-4 py-2 border rounded-lg">
            </div>
            <div>
                <label class="block text-gray-700 font-semibold mb-2">Email Address</label>
                <input type="email" name="email" placeholder="your@email.com" class="w-full px-4 py-2 border rounded-lg">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">Track Order</button>
        </form>
    </div>
</div>
{% endblock %}
