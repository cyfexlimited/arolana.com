{% for ad in ads %}
    <div class="homepage-ad bg-gradient-to-r from-purple-600 to-pink-600 rounded-2xl p-8 text-white text-center shadow-xl">
        {% if ad.image %}
            <img src="{{ ad.image.url }}" alt="{{ ad.title }}" class="mx-auto rounded-lg mb-4">
            <a href="{{ ad.url }}" target="_blank" class="inline-block bg-white text-purple-600 px-6 py-3 rounded-lg">
                {{ ad.button_text }}
            </a>
        {% else %}
            <h3 class="text-3xl font-bold mb-3">{{ ad.title }}</h3>
            <p class="text-xl mb-4">{{ ad.description }}</p>
            <a href="{{ ad.url }}" target="_blank" 
               class="inline-block bg-white text-purple-600 px-8 py-3 rounded-lg font-bold hover:bg-gray-100">
                {{ ad.button_text }}
            </a>
        {% endif %}
    </div>
{% endfor %}
