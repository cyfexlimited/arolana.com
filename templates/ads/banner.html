 {% if ads %}
    <div class="space-y-4">
        {% for ad in ads %}
        <div class="ad-banner" id="ad-{{ ad.id }}">
            <a href="{{ ad.cta_url }}" 
               class="ad-link block relative group"
               target="_blank"
               rel="sponsored nofollow">
                
                {% if ad.image and ad.image.url %}
                    <img src="{{ ad.image.url }}" 
                         alt="{{ ad.alt_text|default:ad.title }}"
                         class="w-full h-auto rounded-lg shadow-md transition transform group-hover:scale-105"
                         style="max-width: {{ ad.placement.width }}px;">
                {% else %}
                    <!-- Fallback HTML ad -->
                    <div class="bg-gradient-to-r from-blue-500 to-purple-600 rounded-lg p-4 text-center text-white">
                        <i class="fas fa-gem text-3xl mb-2"></i>
                        <p class="font-bold">{{ ad.title }}</p>
                        <p class="text-sm">{{ ad.description }}</p>
                        <div class="mt-2">
                            <span class="inline-block bg-white text-blue-600 px-3 py-1 rounded text-sm">
                                {{ ad.cta_text }}
                            </span>
                        </div>
                    </div>
                {% endif %}
                
                {% if ad.campaign.sponsor_name %}
                <div class="absolute top-2 right-2 bg-black bg-opacity-60 text-white text-xs px-2 py-1 rounded">
                    Sponsored
                </div>
                {% endif %}
            </a>
        </div>
        {% endfor %}
    </div>
{% else %}
    <!-- Fallback ad when no active ads -->
    <div class="bg-gradient-to-r from-gray-100 to-gray-200 rounded-lg p-6 text-center border-2 border-dashed border-gray-300">
        <i class="fas fa-ad text-3xl text-gray-400 mb-2"></i>
        <p class="text-gray-600 font-semibold">Ad Space Available</p>
        <p class="text-xs text-gray-500">Your ad could be here!</p>
        <a href="/contact/" class="inline-block mt-3 bg-blue-600 text-white px-4 py-2 rounded text-sm hover:bg-blue-700 transition">
            Advertise →
        </a>
    </div>
{% endif %}
