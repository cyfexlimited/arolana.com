{% for ad in ads %}
    <div class="ad-banner" data-ad-id="{{ ad.id }}" data-campaign-id="{{ ad.campaign.id }}">
        <a href="{{ ad.cta_url }}" target="_blank" rel="noopener noreferrer" 
           class="ad-link block"
           onclick="trackBannerClick({{ ad.id }}, {{ ad.campaign.id }})">
            {% if ad.image %}
                <img src="{{ ad.image.url }}" alt="{{ ad.title }}" 
                     class="w-full h-auto rounded-lg shadow-lg">
            {% elif ad.mobile_image %}
                <img src="{{ ad.mobile_image.url }}" alt="{{ ad.title }}" 
                     class="w-full h-auto rounded-lg shadow-lg block md:hidden">
            {% else %}
                <div class="bg-gradient-to-r from-purple-600 to-blue-600 rounded-lg p-6 text-white">
                    <h3 class="text-xl font-bold mb-2">{{ ad.title }}</h3>
                    <p class="mb-4">{{ ad.description|truncatewords:20 }}</p>
                    <span class="inline-block bg-white text-purple-600 px-4 py-2 rounded-lg font-semibold">
                        {{ ad.cta_text }}
                    </span>
                </div>
            {% endif %}
        </a>
    </div>
{% endfor %}

<script>
function trackBannerClick(adId, campaignId) {
    fetch('/ads/track-click/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken')
        },
        body: JSON.stringify({
            ad_id: adId,
            campaign_id: campaignId
        })
    }).catch(error => console.error('Error tracking banner click:', error));
    
    // Track impression as well
    fetch('/ads/track-view/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken')
        },
        body: JSON.stringify({
            ad_id: adId,
            campaign_id: campaignId
        })
    }).catch(error => console.error('Error tracking impression:', error));
}

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
</script>
