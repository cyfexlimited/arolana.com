{% extends 'base/base.html' %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="bg-white rounded-lg shadow-md p-8">
        <h1 class="text-2xl font-bold mb-4">Apply to Represent {{ manufacturer.name }}</h1>
        <p class="text-gray-600 mb-6">Complete the form below to apply as an authorized reseller.</p>
        
        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="block font-semibold mb-2">Cover Letter *</label>
                <textarea name="cover_letter" rows="5" required class="w-full px-4 py-2 border rounded-lg"></textarea>
            </div>
            
            <div class="mb-4">
                <label class="block font-semibold mb-2">Years of Experience *</label>
                <input type="number" name="experience_years" required class="w-full px-4 py-2 border rounded-lg">
            </div>
            
            <div class="mb-4">
                <label class="block font-semibold mb-2">Estimated Monthly Sales</label>
                <input type="number" name="estimated_monthly_sales" step="0.01" class="w-full px-4 py-2 border rounded-lg">
            </div>
            
            <div class="mb-4">
                <label class="block font-semibold mb-2">Target Customers</label>
                <textarea name="target_customers" rows="3" class="w-full px-4 py-2 border rounded-lg"></textarea>
            </div>
            
            <div class="mb-6">
                <label class="block font-semibold mb-2">Marketing Plan</label>
                <textarea name="marketing_plan" rows="3" class="w-full px-4 py-2 border rounded-lg"></textarea>
            </div>
            
            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700">
                Submit Application
            </button>
        </form>
    </div>
</div>
{% endblock %}
