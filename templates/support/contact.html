{% extends 'base/base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-lg shadow-md p-8">
        <h1 class="text-3xl font-bold mb-6 text-center">Contact Us</h1>
        
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-gray-700 font-semibold mb-2">Name</label>
                <input type="text" name="name" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <div>
                <label class="block text-gray-700 font-semibold mb-2">Email</label>
                <input type="email" name="email" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <div>
                <label class="block text-gray-700 font-semibold mb-2">Subject</label>
                <input type="text" name="subject" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <div>
                <label class="block text-gray-700 font-semibold mb-2">Message</label>
                <textarea name="message" rows="5" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
            </div>
            
            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">
                Send Message
            </button>
        </form>
        
        <div class="mt-8 pt-6 border-t">
            <h3 class="font-semibold mb-3">Other Ways to Reach Us</h3>
            <div class="space-y-2 text-gray-600">
                <p><i class="fas fa-phone w-6"></i> 1-800-AROLANA</p>
                <p><i class="fas fa-envelope w-6"></i> support@arolana.com</p>
                <p><i class="fas fa-clock w-6"></i> Mon-Fri: 9am-6pm EST</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
