{% extends 'base/base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-lg shadow-md p-8">
        <h1 class="text-3xl font-bold mb-6 text-center">Track Your Order</h1>
        
        <form method="GET" class="space-y-4">
            <div>
                <label class="block text-gray-700 font-semibold mb-2">Order Number</label>
                <input type="text" name="order_number" placeholder="e.g., ARO-123456" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <div>
                <label class="block text-gray-700 font-semibold mb-2">Email Address</label>
                <input type="email" name="email" placeholder="email@example.com" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">
                Track Order
            </button>
        </form>
        
        <div class="mt-8 pt-6 border-t text-center text-gray-600">
            <p>Don't have an account? <a href="{% url 'accounts:register' %}" class="text-blue-600">Register here</a></p>
            <p class="mt-2">Need help? <a href="{% url 'contact' %}" class="text-blue-600">Contact Support</a></p>
        </div>
    </div>
</div>
{% endblock %}
