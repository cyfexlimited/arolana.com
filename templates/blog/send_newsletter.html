{% extends 'base/base.html' %}

{% block title %}Send Newsletter{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="bg-white rounded-xl shadow-lg p-8">
        <h1 class="text-3xl font-bold mb-6">Send Newsletter</h1>
        
        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="block font-semibold mb-2">Subject</label>
                <input type="text" name="subject" required 
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="Enter email subject">
            </div>
            
            <div class="mb-4">
                <label class="block font-semibold mb-2">Message</label>
                <textarea name="message" rows="10" required 
                          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                          placeholder="Write your newsletter content here..."></textarea>
            </div>
            
            <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-4 mb-6">
                <p class="text-sm text-yellow-800">
                    <i class="fas fa-info-circle"></i>
                    This will send an email to all active subscribers.
                </p>
            </div>
            
            <div class="flex gap-3">
                <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
                    <i class="fas fa-paper-plane"></i> Send Newsletter
                </button>
                <a href="{% url 'blog:newsletter_admin' %}" class="bg-gray-600 text-white px-6 py-2 rounded-lg hover:bg-gray-700">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
