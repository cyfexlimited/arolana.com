<div>
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold">Orders</h1>
        <a href="/admin/orders/order/add/" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700" target="_blank">
            <i class="fas fa-plus"></i> Add Order
        </a>
    </div>
    <div class="overflow-x-auto">
        <table class="w-full">
            <thead>
                <tr class="border-b">
                    <th class="text-left py-3">Order #</th>
                    <th class="text-left py-3">Customer</th>
                    <th class="text-left py-3">Total</th>
                    <th class="text-left py-3">Status</th>
                    <th class="text-left py-3">Date</th>
                </tr>
            </thead>
            <tbody>
                {% for order in orders %}
                <tr class="border-b hover:bg-gray-50">
                    <td class="py-3">{{ order.order_number }}</td>
                    <td class="py-3">{{ order.user.email|truncatechars:25 }}</td>
                    <td class="py-3">${{ order.total }}</td>
                    <td class="py-3">
                        <span class="px-2 py-1 rounded-full text-xs font-semibold 
                            {% if order.status == 'delivered' %}bg-green-100 text-green-700
                            {% elif order.status == 'pending' %}bg-yellow-100 text-yellow-700
                            {% elif order.status == 'cancelled' %}bg-red-100 text-red-700
                            {% else %}bg-blue-100 text-blue-700{% endif %}">
                            {{ order.status|title }}
                        </span>
                    </td>
                    <td class="py-3">{{ order.created_at|date:"Y-m-d" }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
