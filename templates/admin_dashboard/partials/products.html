<div>
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold">Products</h1>
        <a href="/admin/products/product/add/" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700" target="_blank">
            <i class="fas fa-plus"></i> Add Product
        </a>
    </div>
    <div class="overflow-x-auto">
        <table class="w-full">
            <thead>
                <tr class="border-b">
                    <th class="text-left py-3">Name</th>
                    <th class="text-left py-3">SKU</th>
                    <th class="text-left py-3">Price</th>
                    <th class="text-left py-3">Stock</th>
                    <th class="text-left py-3">Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for product in products %}
                <tr class="border-b hover:bg-gray-50">
                    <td class="py-3">{{ product.name|truncatechars:50 }}</td>
                    <td class="py-3">{{ product.sku }}</td>
                    <td class="py-3">${{ product.price }}</td>
                    <td class="py-3">{{ product.stock_quantity }}</td>
                    <td class="py-3">
                        <a href="/admin/products/product/{{ product.id }}/change/" class="text-blue-600 hover:underline" target="_blank">Edit</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
