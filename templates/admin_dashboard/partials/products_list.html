<div>
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold">Products Management</h1>
        <button onclick="showAddProductForm()" class="btn btn-success">
            <i class="fas fa-plus"></i> Add Product
        </button>
    </div>
    
    <input type="text" id="searchInput" class="search-box" placeholder="Search products..." onkeyup="searchTable()">
    
    <div class="overflow-x-auto">
        <table class="data-table" id="dataTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>SKU</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for product in products %}
                <tr>
                    <td>{{ product.id }}</td>
                    <td>{{ product.name|truncatechars:50 }}</td>
                    <td>{{ product.sku }}</td>
                    <td>${{ product.price }}</td>
                    <td>{{ product.stock_quantity }}</td>
                    <td>
                        <button onclick='editProduct({{ product.id }}, {{ product|safe }})' class="btn btn-primary btn-sm">Edit</button>
                        <button onclick='deleteItem("product", {{ product.id }}, "{{ product.name|escapejs }}")' class="btn btn-danger btn-sm">Delete</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<script>
function editProduct(id, data) {
    editItem('product', id, {
        name: data.name,
        price: data.price,
        stock_quantity: data.stock_quantity
    });
}

function showAddProductForm() {
    const html = `
        <h3 class="text-lg font-bold mb-4">Add New Product</h3>
        <div class="mb-3">
            <label class="block text-sm font-medium mb-1">Name</label>
            <input type="text" id="productName" class="w-full p-2 border rounded">
        </div>
        <div class="mb-3">
            <label class="block text-sm font-medium mb-1">Price</label>
            <input type="number" id="productPrice" class="w-full p-2 border rounded">
        </div>
        <div class="mb-3">
            <label class="block text-sm font-medium mb-1">Stock Quantity</label>
            <input type="number" id="productStock" class="w-full p-2 border rounded">
        </div>
        <div class="flex justify-end gap-2">
            <button onclick="closeModal()" class="btn btn-warning">Cancel</button>
            <button onclick="saveNewProduct()" class="btn btn-primary">Save</button>
        </div>
    `;
    document.getElementById('modalTitle').innerText = 'Add Product';
    document.getElementById('modalBody').innerHTML = html;
    document.getElementById('editModal').style.display = 'flex';
}

function saveNewProduct() {
    const data = {
        name: document.getElementById('productName').value,
        price: document.getElementById('productPrice').value,
        stock_quantity: document.getElementById('productStock').value
    };
    
    fetch('/dashboard/api/product/create/', {
        method: 'POST',
        headers: {
            'X-CSRFToken': getCookie('csrftoken'),
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(data)
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            alert('Product added successfully!');
            closeModal();
            loadModule('products');
        } else {
            alert('Error: ' + data.error);
        }
    });
}
</script>
