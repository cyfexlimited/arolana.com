{% extends 'base/base.html' %}

{% block title %}Send Campaign | Arolana{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto px-4 py-10">
    <div class="bg-white rounded-xl shadow-lg border border-gray-100 p-6">
        <h1 class="text-2xl font-bold text-gray-950">Send campaign?</h1>
        <p class="mt-3 text-gray-600">This will send <strong>{{ campaign.subject }}</strong> to {{ campaign.get_recipient_scope_display|lower }}.</p>
        <form method="post" class="mt-6 flex flex-col sm:flex-row gap-3 justify-end">
            {% csrf_token %}
            <a href="{% url 'newsletter:campaign_detail' campaign.id %}" class="inline-flex justify-center rounded-lg border border-gray-300 px-5 py-3 font-semibold text-gray-700 hover:bg-gray-50">Cancel</a>
            <button type="submit" class="inline-flex justify-center rounded-lg bg-gray-950 px-5 py-3 font-semibold text-white hover:bg-gray-800">Send now</button>
        </form>
    </div>
</div>
{% endblock %}
