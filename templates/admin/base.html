{% extends "admin/base.html" %}

{% block extrastyle %}
{{ block.super }}
<style id="arolana-admin-appearance">
    :root {
        --ar-admin-page-bg: {{ admin_appearance.page_background_color|default:"#F6F8FB" }};
        --ar-admin-content-bg: {{ admin_appearance.content_background_color|default:"#FFFFFF" }};
        --ar-admin-card-bg: {{ admin_appearance.card_background_color|default:"#FFFFFF" }};
        --ar-admin-text: {{ admin_appearance.text_color|default:"#111827" }};
        --ar-admin-muted: {{ admin_appearance.muted_text_color|default:"#667085" }};
        --ar-admin-primary: {{ admin_appearance.primary_color|default:"#2563EB" }};
        --ar-admin-accent: {{ admin_appearance.accent_color|default:"#0F766E" }};
        --ar-admin-hero-start: {{ admin_appearance.hero_start_color|default:"#111827" }};
        --ar-admin-hero-end: {{ admin_appearance.hero_end_color|default:"#0F766E" }};
        --ar-admin-navbar-bg: {{ admin_appearance.navbar_background_color|default:"#FFFFFF" }};
        --ar-admin-navbar-text: {{ admin_appearance.navbar_text_color|default:"#111827" }};
        --ar-admin-sidebar-bg: {{ admin_appearance.sidebar_background_color|default:"#FFFFFF" }};
        --ar-admin-sidebar-text: {{ admin_appearance.sidebar_text_color|default:"#1F2937" }};
