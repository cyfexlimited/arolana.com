{% extends 'base/base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-lg shadow-md p-8">
        <h1 class="text-2xl font-bold mb-6">Upload Document</h1>
        
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="block font-semibold mb-2">Document Type *</label>
                <select name="document_type" required class="w-full px-4 py-2 border rounded-lg">
                    <option value="business_registration">Business Registration Certificate</option>
                    <option value="tax_id">Tax ID / VAT Certificate</option>
                    <option value="bank_statement">Bank Account Statement</option>
                    <option value="utility_bill">Utility Bill (Address Proof)</option>
                    <option value="id_proof">Government ID Proof</option>
                    <option value="other">Other Document</option>
                </select>
            </div>
            
            <div class="mb-4">
                <label class="block font-semibold mb-2">Document File *</label>
                <input type="file" name="document_file" required accept=".pdf,.jpg,.jpeg,.png" class="w-full px-4 py-2 border rounded-lg">
                <p class="text-sm text-gray-500 mt-1">Accepted formats: PDF, JPG, PNG (Max 5MB)</p>
            </div>
            
            <div class="mb-4">
                <label class="block font-semibold mb-2">Document Number</label>
                <input type="text" name="document_number" class="w-full px-4 py-2 border rounded-lg">
            </div>
            
            <div class="mb-4">
                <label class="block font-semibold mb-2">Expiry Date</label>
                <input type="date" name="expiry_date" class="w-full px-4 py-2 border rounded-lg">
            </div>
            
            <div class="mb-6">
                <label class="block font-semibold mb-2">Description</label>
                <textarea name="description" rows="3" class="w-full px-4 py-2 border rounded-lg"></textarea>
            </div>
            
            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">
                Upload Document
            </button>
        </form>
    </div>
</div>
{% endblock %}
