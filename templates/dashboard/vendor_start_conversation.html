{% extends 'dashboard/base_dashboard.html' %}
{% load static %}

{% block title %}Start Conversation - Vendor Dashboard{% endblock %}

{% block dashboard_content %}
<div class="bg-white rounded-xl shadow-lg p-6">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold">Start New Conversation with Admin</h1>
        <a href="{% url 'dashboard:vendor_messages' %}" class="text-gray-600 hover:text-gray-800">
            <i class="fas fa-arrow-left"></i> Back to Messages
        </a>
    </div>
    
    <form method="POST" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Select Admin</label>
            <select name="admin_id" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                <option value="">Select an administrator</option>
                {% for admin in admins %}
                <option value="{{ admin.id }}">{{ admin.email }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Subject</label>
            <input type="text" name="subject" required placeholder="Enter subject" 
                   class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Message</label>
            <textarea name="message" rows="6" required placeholder="Type your message here..." 
                      class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"></textarea>
        </div>
        <div class="flex justify-end">
            <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
                <i class="fas fa-paper-plane"></i> Send Message
            </button>
        </div>
    </form>
</div>
{% endblock %}
