{% extends 'base/base.html' %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow-lg p-8">
    <div class="text-center mb-8">
        <i class="fas fa-key text-5xl text-blue-600 mb-4"></i>
        <h2 class="text-3xl font-bold text-gray-900">Recover 2FA</h2>
        <p class="text-gray-600 mt-2">Enter a backup code to disable 2FA</p>
    </div>
    
    <form method="POST" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Backup Code</label>
            <input type="text" name="backup_code" required
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent text-center font-mono"
                   placeholder="XXXXXXXX">
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition font-semibold">
            Verify & Disable 2FA
        </button>
    </form>
    
    <p class="text-center text-sm text-gray-600 mt-6">
        <a href="{% url 'accounts:disable_2fa' %}" class="text-blue-600 hover:text-blue-500">Use password instead</a>
    </p>
</div>
{% endblock %}
