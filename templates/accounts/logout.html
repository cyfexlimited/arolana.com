{% extends 'base/base.html' %}

{% block title %}Signed Out | Arolana{% endblock %}

{% block content %}
<section class="bg-gray-50 py-16">
    <div class="max-w-xl mx-auto px-4 text-center">
        <div class="bg-white border border-gray-200 rounded-xl shadow-xl p-8">
            <div class="mx-auto w-16 h-16 rounded-full bg-green-100 text-green-700 flex items-center justify-center">
                <i class="fas fa-check text-2xl"></i>
            </div>
            <h1 class="mt-6 text-3xl font-bold text-gray-950">You are signed out</h1>
            <p class="mt-3 text-gray-600">
                {% if username %}Goodbye, {{ username }}. {% endif %}Your account session has ended safely.
            </p>
            <div class="mt-8 flex flex-col sm:flex-row gap-3 justify-center">
                <a href="{% url 'accounts:login' %}" class="inline-flex items-center justify-center gap-2 rounded-lg bg-gray-950 px-5 py-3 text-white font-semibold hover:bg-gray-800">
                    <i class="fas fa-right-to-bracket"></i>
                    Sign in again
                </a>
                <a href="{% url 'home' %}" class="inline-flex items-center justify-center gap-2 rounded-lg border border-gray-300 px-5 py-3 text-gray-800 font-semibold hover:bg-gray-50">
                    <i class="fas fa-house"></i>
                    Go home
                </a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
