{% extends 'base/base.html' %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow-lg p-8">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-bold text-gray-900">Forgot Password?</h2>
        <p class="text-gray-600 mt-2">Enter your email or phone to reset password</p>
    </div>
    
    <form method="POST" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Email or Phone Number</label>
            <input type="text" name="identifier" required 
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition font-semibold">
            Send Reset OTP
        </button>
    </form>
    
    <p class="text-center text-sm text-gray-600 mt-6">
        Remember your password? 
        <a href="{% url 'accounts:login' %}" class="text-blue-600 hover:text-blue-500 font-semibold">Back to Sign In</a>
    </p>
</div>
{% endblock %}
